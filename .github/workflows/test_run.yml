name: KOSPI200 Dashboard Auto Run

on:
  workflow_dispatch: # 수동 실행 버튼
  # schedule: # 주석을 해제하면 매일 자동 실행됩니다.
  #   - cron: '10 7 * * 1-5' # 월~금 오후 4시 10분 (KST)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 쓰기 권한 허용
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pandas requests plotly beautifulsoup4 lxml
          
      - name: Run Data Collection
        run: python scripts/run_kpi200.py
        
      - name: Run Visualization
        run: python scripts/treemap_kpi200.py
        
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update: Market Data and Dashboard" || echo "No changes to commit"
          git push
