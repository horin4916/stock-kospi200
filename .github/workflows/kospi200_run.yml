name: KOSPI200 Daily & Weekly Dashboard

on:
  workflow_dispatch: # 수동 실행
  schedule:
    # 월~금 오후 4시 10분 (KST) 실행 (UTC 07:10)
    - cron: '10 7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pandas requests plotly beautifulsoup4 lxml
          
      # [1] 공통/일간 작업: 데이터 수집 및 일간 트리맵 생성
      - name: Daily Data Collection
        run: python scripts/01_collect_daily.py
        
      - name: Daily Visualization
        run: python scripts/02_daily_treemap.py
        
      # [2] 금요일 전용 작업: 주간 요약 데이터 및 트리맵 생성
      # github.event.schedule이 금요일(5)이거나 수동 실행 시 금요일인 경우 작동
      - name: Weekly Summary & Visualization (Friday Only)
        if: github.event.schedule == '10 7 * * 5' || contains(github.event.inputs.tags, 'weekly') || success()
        run: |
          # 오늘이 금요일인지 파이썬으로 한 번 더 체크하여 실행
          python -c "from datetime import datetime; import os; exit(0 if datetime.now().weekday() == 4 else 1)" && (
            python scripts/03_process_weekly.py
            python scripts/04_weekly_treemap.py
          ) || echo "Not Friday, skipping weekly tasks."

      # [3] 변경사항 저장
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: Daily/Weekly Market Data [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push
