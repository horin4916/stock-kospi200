name: KOSPI200 Daily & Weekly Dashboard

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # 한국 시간 오후 4시 10분 (UTC 오전 7시 10분)
    # 서버 대기열을 고려해 정각이 아닌 '10분'으로 설정하는 것이 안정적입니다.
    - cron: '10 7 * * 1-5' 

jobs:
  build:
    runs-on: ubuntu-latest
    # 아래 env 섹션을 추가합니다.
    env:
      TZ: Asia/Seoul 

    steps:
      - uses: actions/checkout@v4
      # ... 이하 동일
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리를 가져와 Rebase 오류 방지
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pandas requests plotly beautifulsoup4 lxml
          
      # [1] 공통 작업: 데이터 수집 및 일간 트리맵 생성
      - name: Daily Data Collection & Visualization
        run: |
          python scripts/01_collect_daily.py
          python scripts/02_daily_treemap.py
        
      # [2] 금요일 전용 작업: 주간 요약 데이터 및 트리맵 생성
      - name: Weekly Summary & Visualization (Friday Only)
        run: |
          # 파이썬으로 오늘이 금요일(4)인지 체크 후 실행
          python -c "from datetime import datetime; import sys; sys.exit(0 if datetime.now().weekday() == 4 else 1)" && (
            echo "Today is Friday. Running weekly tasks..."
            python scripts/03_process_weekly.py
            python scripts/04_weekly_treemap.py
          ) || echo "Not Friday, skipping weekly tasks."

      # [3] 인덱스 페이지 업데이트 (보관함 목록 갱신)
      - name: Update Index Page
        run: python scripts/00_make_index.py

      # [4] 모든 변경사항 저장 및 푸시
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          
          # 변경사항이 있을 때만 커밋
          git commit -m "Auto-update: Market Data & Index [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          
          # 원격 저장소의 최신 상태를 가져와 합친 후 푸시 (충돌 방지)
          git pull --rebase origin main
          git push origin main
